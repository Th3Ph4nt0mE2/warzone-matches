<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warzone Tournaments</title>
    <!-- Bootstrap CSS from CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Local CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">Warzone Manager</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link active" href="#" id="view-tournaments-link">View Tournaments</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" id="register-tournament-link">Register Tournament</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" id="register-team-link">Register Team</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" id="register-player-link">Register Player</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container mt-5">
        <div id="app-content">
            <h1 class="mb-4">Warzone Tournaments</h1>

            <!-- Container for the list of tournaments -->
            <div id="tournaments-list-view">
                <h2>Tournaments</h2>
                <ul class="list-group" id="tournaments-list-ul">
                    <!-- Tournaments will be loaded here dynamically -->
                </ul>

                <!-- Container for the tournament summary -->
                <div id="tournament-summary" class="mt-5">
                    <h2>Tournament Summary</h2>
                    <div id="summary-content">
                        <!-- Summary will be loaded here dynamically -->
                    </div>
                </div>
            </div>

            <!-- Register Tournament View -->
            <div id="register-tournament-view" style="display: none;">
                <h2>Register Tournament</h2>
                <form id="register-tournament-form">
                    <div class="mb-3">
                        <label for="tournament-id" class="form-label">ID</label>
                        <input type="text" class="form-control" id="tournament-id" required>
                    </div>
                    <div class="mb-3">
                        <label for="tournament-name" class="form-label">Name</label>
                        <input type="text" class="form-control" id="tournament-name" required>
                    </div>
                    <div class="mb-3">
                        <label for="tournament-status" class="form-label">Status</label>
                        <input type="text" class="form-control" id="tournament-status" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Register</button>
                </form>
            </div>

            <!-- Register Team View -->
            <div id="register-team-view" style="display: none;">
                <h2>Register Team</h2>
                <form id="register-team-form">
                    <div class="mb-3">
                        <label for="team-id" class="form-label">ID</label>
                        <input type="number" class="form-control" id="team-id" required>
                    </div>
                    <div class="mb-3">
                        <label for="team-name" class="form-label">Name</label>
                        <input type="text" class="form-control" id="team-name" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Register</button>
                </form>
            </div>

            <!-- Register Player View -->
            <div id="register-player-view" style="display: none;">
                <h2>Register Player</h2>
                <form id="register-player-form">
                    <div class="mb-3">
                        <label for="player-id" class="form-label">ID</label>
                        <input type="number" class="form-control" id="player-id" required>
                    </div>
                    <div class="mb-3">
                        <label for="player-name" class="form-label">Name</label>
                        <input type="text" class="form-control" id="player-name" required>
                    </div>
                    <div class="mb-3">
                        <label for="player-nickname" class="form-label">Nickname</label>
                        <input type="text" class="form-control" id="player-nickname" required>
                    </div>
                    <div class="mb-3">
                        <label for="player-role" class="form-label">Role</label>
                        <input type="text" class="form-control" id="player-role" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Register</button>
                </form>
            </div>
        </div>
    </main>

    <!-- Local JS -->
    <script src="js/script.js"></script>
</body>
</html>
