<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warzone Tournaments</title>
    <!-- Bootstrap CSS from CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Local CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="d-flex" id="wrapper">
        <!-- Sidebar -->
        <div class="bg-dark border-right" id="sidebar-wrapper">
            <div class="sidebar-heading">Warzone Manager</div>
            <div class="list-group list-group-flush">
                <a href="#" class="list-group-item list-group-item-action bg-dark text-white nav-link active" id="view-tournaments-link">View Tournaments</a>
                <a href="#" class="list-group-item list-group-item-action bg-dark text-white nav-link" id="register-tournament-link">Register Tournament</a>
                <a href="#" class="list-group-item list-group-item-action bg-dark text-white nav-link" id="register-team-link">Register Team</a>
                <a href="#" class="list-group-item list-group-item-action bg-dark text-white nav-link" id="register-player-link">Register Player</a>
            </div>
        </div>
        <!-- /#sidebar-wrapper -->

        <!-- Page Content -->
        <div id="page-content-wrapper">
            <div class="container-fluid pt-4">
                <div id="app-content">
                    <!-- The h1 will be dynamically updated by JS now -->
                    <h1 class="mb-4" id="view-title">Warzone Tournaments</h1>

                    <!-- Container for the list of tournaments -->
                    <div id="tournaments-list-view">
                        <!-- Content is already here from previous steps -->
                        <h2>Tournaments</h2>
                        <ul class="list-group" id="tournaments-list-ul"></ul>
                        <div id="tournament-summary" class="mt-5">
                            <h2>Tournament Summary</h2>
                            <div id="summary-content"></div>
                        </div>
                    </div>

                    <!-- Register Tournament View -->
                    <div id="register-tournament-view" style="display: none;">
                        <h2>Register Tournament</h2>
                        <form id="register-tournament-form">
                            <div class="mb-3">
                                <label for="tournament-name" class="form-label">Name</label>
                                <input type="text" class="form-control" id="tournament-name" required>
                            </div>
                            <button type="submit" class="btn btn-primary">Register</button>
                        </form>
                    </div>

                    <!-- Register Team View -->
                    <div id="register-team-view" style="display: none;">
                        <h2>Register Team</h2>
                        <form id="register-team-form">
                            <div class="mb-3">
                                <label for="team-name" class="form-label">Name</label>
                                <input type="text" class="form-control" id="team-name" required>
                            </div>
                            <button type="submit" class="btn btn-primary">Register</button>
                        </form>
                    </div>

                    <!-- Register Player View -->
                    <div id="register-player-view" style="display: none;">
                        <h2>Register Player</h2>
                        <form id="register-player-form">
                            <div class="mb-3">
                                <label for="player-name" class="form-label">Name</label>
                                <input type="text" class="form-control" id="player-name" required>
                            </div>
                            <div class="mb-3">
                                <label for="player-nickname" class="form-label">Nickname</label>
                                <input type="text" class="form-control" id="player-nickname" required>
                            </div>
                            <div class="mb-3">
                                <label for="player-role" class="form-label">Role</label>
                                <input type="text" class="form-control" id="player-role" required>
                            </div>
                            <button type="submit" class="btn btn-primary">Register</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        <!-- /#page-content-wrapper -->
    </div>
    <!-- /#wrapper -->

    <!-- Local JS -->
    <script src="js/script.js"></script>
</body>
</html>
