<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warzone Tournaments</title>
    <!-- Bootstrap CSS from CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Local CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container mt-5">
        <h1 class="mb-4">Warzone Tournaments</h1>

        <!-- Container for the list of tournaments -->
        <div id="tournaments-list" class="mb-5">
            <h2>Tournaments</h2>
            <ul class="list-group">
                <!-- Tournaments will be loaded here dynamically -->
            </ul>
        </div>

        <!-- Container for the tournament summary -->
        <div id="tournament-summary">
            <h2>Tournament Summary</h2>
            <div id="summary-content">
                <!-- Summary will be loaded here dynamically -->
            </div>
        </div>
    </div>

    <!-- Local JS -->
    <script src="js/script.js"></script>
</body>
</html>
