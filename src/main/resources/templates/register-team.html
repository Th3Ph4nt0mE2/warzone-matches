<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Team - Thymeleaf</title>
    <!-- Bootstrap CSS from CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <main class="container mt-5">
        <h1 class="mb-4">Register Team</h1>
        <form th:action="@{/view/register/team}" th:object="${team}" method="post">
            <div class="mb-3">
                <label for="idTeams" class="form-label">ID</label>
                <input type="number" class="form-control" id="idTeams" th:field="*{idTeams}" required>
            </div>
            <div class="mb-3">
                <label for="name" class="form-label">Name</label>
                <input type="text" class="form-control" id="name" th:field="*{name}" required>
            </div>
            <button type="submit" class="btn btn-primary">Register</button>
        </form>
    </main>
</body>
</html>
